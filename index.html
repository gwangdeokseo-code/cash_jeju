<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="현금장부" />
  <title>💰 현금장부</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:#1a73e8; --blue-l:#e8f0fe; --blue-d:#1557b0;
      --green:#188038; --green-l:#e6f4ea;
      --red:#c5221f; --red-l:#fce8e6;
      --orange:#e37400; --orange-l:#fef3e2;
      --bg:#f8f9fa; --surface:#fff; --surface2:#f1f3f4;
      --border:#dadce0; --text:#202124; --text2:#5f6368; --text3:#9aa0a6;
      --radius:12px; --shadow:0 1px 3px rgba(0,0,0,0.12);
    }
    html,body{height:100%;font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);}
    .app{display:grid;grid-template-columns:310px 1fr;height:100vh;overflow:hidden;}
    .left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
    .logo{padding:20px 20px 14px;text-align:center;border-bottom:1px solid var(--border);}
    .logo h1{font-size:24px;font-weight:700;}
    .logo p{font-size:13px;color:var(--text2);margin-top:3px;}
    .sync-status{font-size:12px;padding:2px 8px;border-radius:10px;margin-top:6px;display:inline-block;}
    .sync-status.ok{background:var(--green-l);color:var(--green);}
    .sync-status.loading{background:var(--blue-l);color:var(--blue);}
    .sync-status.err{background:var(--red-l);color:var(--red);}
    .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;}
    .sum-card{border-radius:10px;padding:12px 8px;text-align:center;}
    .sum-card.red{background:var(--red-l);} .sum-card.green{background:var(--green-l);} .sum-card.gray{background:var(--surface2);}
    .sum-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
    .sum-card.red .sum-label{color:var(--red);} .sum-card.green .sum-label{color:var(--green);}
    .sum-value{font-size:18px;font-weight:700;}
    .sum-card.red .sum-value{color:var(--red);} .sum-card.green .sum-value{color:var(--green);}
    .form-area{padding:0 14px 14px;display:flex;flex-direction:column;gap:10px;}
    .form-title{font-size:16px;font-weight:600;}
    .form-group{display:flex;flex-direction:column;gap:4px;}
    .form-group label{font-size:14px;color:var(--text2);}
    .ac-wrap{position:relative;}
    input{height:48px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;background:var(--surface);color:var(--text);width:100%;outline:none;-webkit-appearance:none;}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,0.15);}
    .ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--blue);border-radius:10px;z-index:100;max-height:180px;overflow-y:auto;box-shadow:var(--shadow);display:none;}
    .ac-item{padding:10px 14px;font-size:16px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .ac-item:last-child{border-bottom:none;}
    .ac-item:hover,.ac-item.hi{background:var(--blue-l);color:var(--blue);}
    .ac-phone{font-size:12px;color:var(--text3);}
    .btn-add{height:52px;font-size:18px;font-weight:600;border-radius:12px;border:none;background:var(--blue);color:#fff;cursor:pointer;box-shadow:var(--shadow);}
    .btn-add:active{transform:scale(0.98);}
    .btn-history{height:44px;font-size:15px;font-weight:500;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;margin:0 14px 14px;}
    .right{display:flex;flex-direction:column;overflow:hidden;}
    .topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
    .filter-row{display:flex;gap:6px;}
    .f-btn{height:38px;padding:0 14px;font-size:14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
    .f-btn.on{background:var(--blue-l);color:var(--blue);border-color:var(--blue);font-weight:600;}
    .date-row{display:flex;gap:5px;align-items:center;}
    .date-row input{height:38px;font-size:13px;width:128px;}
    .date-row span{color:var(--text3);font-size:13px;}
    .card-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;align-content:start;}
    .cust-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
    .cust-card.debt{border-left:5px solid var(--red);} .cust-card.paid{border-left:5px solid var(--green);opacity:0.75;}
    .card-head{padding:12px 14px 6px;display:flex;justify-content:space-between;align-items:center;}
    .card-name{font-size:20px;font-weight:700;color:var(--text);cursor:pointer;}
    .card-name:hover{color:var(--blue);}
    .card-phone{font-size:13px;color:var(--text3);padding:0 14px 4px;}
    .badge{font-size:14px;font-weight:600;padding:4px 12px;border-radius:20px;}
    .badge.red{background:var(--red-l);color:var(--red);} .badge.green{background:var(--green-l);color:var(--green);}
    .txn-list{padding:0 14px 6px;max-height:140px;overflow-y:auto;}
    .txn-row{display:flex;align-items:center;gap:5px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
    .txn-row:last-child{border-bottom:none;}
    .txn-date{color:var(--text3);font-size:12px;white-space:nowrap;}
    .txn-memo{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .txn-amt{font-weight:600;white-space:nowrap;font-size:13px;}
    .txn-amt.plus{color:var(--red);} .txn-amt.minus{color:var(--green);}
    .card-btns{display:flex;gap:6px;padding:6px 12px 12px;}
    .btn-pay{flex:1;height:44px;font-size:15px;font-weight:600;border-radius:10px;border:1.5px solid var(--green);background:var(--green-l);color:var(--green);cursor:pointer;}
    .btn-pay:hover{background:var(--green);color:#fff;}
    .btn-pay:disabled{opacity:0.4;cursor:default;}
    .btn-call{height:44px;width:44px;border-radius:10px;border:1.5px solid var(--blue);background:var(--blue-l);color:var(--blue);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;text-decoration:none;}
    .btn-call:hover{background:var(--blue);color:#fff;}
    .btn-sms{height:44px;width:44px;border-radius:10px;border:1.5px solid var(--orange);background:var(--orange-l);color:var(--orange);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
    .btn-sms:hover{background:var(--orange);color:#fff;}
    .btn-del{height:44px;width:44px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
    .btn-del:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
    .btn-disabled{height:44px;width:44px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;opacity:0.4;}
    .empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:17px;line-height:1.7;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
    .modal{background:var(--surface);border-radius:16px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid var(--border);}
    .modal-head h2{font-size:20px;font-weight:700;}
    .btn-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:6px;}
    .modal-body{padding:16px 20px;max-height:52vh;overflow-y:auto;}
    .modal-foot{padding:12px 20px 18px;display:flex;gap:10px;border-top:1px solid var(--border);}
    .btn-sec{flex:1;height:50px;font-size:16px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;}
    .btn-primary{flex:1;height:50px;font-size:16px;font-weight:600;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;}
    .btn-primary.green-btn{background:var(--green);}
    .btn-primary.orange-btn{background:var(--orange);}
    .pay-desc{font-size:16px;color:var(--text2);margin-bottom:14px;}
    .pay-input{height:60px;font-size:24px;font-weight:700;text-align:right;margin-bottom:4px;}
    .pay-hint{font-size:12px;color:var(--text3);text-align:right;}
    .day-group{margin-bottom:16px;}
    .day-label{font-size:14px;font-weight:600;padding:5px 0;border-bottom:2px solid var(--border);margin-bottom:5px;display:flex;justify-content:space-between;}
    .day-total.plus{color:var(--red);} .day-total.minus{color:var(--green);}
    .day-txn{display:flex;align-items:center;gap:7px;padding:7px 4px;border-bottom:1px solid var(--border);font-size:14px;}
    .day-txn:last-child{border-bottom:none;}
    .day-name{font-weight:600;min-width:50px;}
    .day-memo{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .detail-info{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
    .detail-row{display:flex;align-items:center;gap:10px;}
    .detail-label{font-size:14px;color:var(--text2);min-width:70px;}
    .detail-val{font-size:16px;color:var(--text);font-weight:500;}
    .detail-actions{display:flex;gap:8px;margin-bottom:16px;}
    .btn-action{flex:1;height:52px;font-size:16px;font-weight:600;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;}
    .btn-action.call{background:var(--blue-l);color:var(--blue);border:1.5px solid var(--blue);}
    .btn-action.call:hover{background:var(--blue);color:#fff;}
    .btn-action.sms{background:var(--orange-l);color:var(--orange);border:1.5px solid var(--orange);}
    .btn-action.sms:hover{background:var(--orange);color:#fff;}
    .btn-action.disabled{background:var(--surface2);color:var(--text3);border:1.5px solid var(--border);cursor:default;opacity:0.5;}
    .detail-divider{border:none;border-top:1px solid var(--border);margin:4px 0 12px;}
    .detail-txn-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px;}
    .sms-preview{background:var(--surface2);border-radius:10px;padding:14px;font-size:15px;color:var(--text);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;word-break:break-all;}
    .sms-to{font-size:13px;color:var(--text3);margin-bottom:12px;}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 22px;border-radius:10px;font-size:15px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
    .loading-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
    .loading-screen h2{font-size:22px;font-weight:700;color:var(--text);}
    .loading-screen p{font-size:15px;color:var(--text2);}
    .spinner{width:48px;height:48px;border:4px solid var(--blue-l);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <h2>💰 현금장부</h2>
  <p>데이터 불러오는 중...</p>
</div>

<div class="app" style="display:none" id="mainApp">
  <div class="left">
    <div class="logo">
      <h1>💰 현금장부</h1>
      <p id="todayLbl"></p>
      <span class="sync-status loading" id="syncStatus">연결 중...</span>
    </div>
    <div class="sum-grid" id="sumGrid"></div>
    <div class="form-area">
      <div class="form-title">📝 외상 기록 추가</div>
      <div class="form-group">
        <label>손님 이름</label>
        <div class="ac-wrap">
          <input id="iName" type="text" placeholder="이름 입력 또는 선택"
            autocomplete="off" oninput="onAcInput()" onfocus="onAcInput()" onblur="hideAc()" onkeydown="onAcKey(event)" />
          <div class="ac-list" id="acList"></div>
        </div>
      </div>
      <div class="form-group">
        <label>전화번호 (선택 — 새 손님일 때만)</label>
        <input id="iPhone" type="tel" placeholder="예: 010-1234-5678" inputmode="tel" />
      </div>
      <div class="form-group">
        <label>금액 (원)</label>
        <input id="iAmt" type="number" placeholder="예: 50000" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label>메모 (선택)</label>
        <input id="iMemo" type="text" placeholder="예: 사과 2박스" />
      </div>
      <button class="btn-add" onclick="addTxn()">+ 외상 추가</button>
    </div>
    <button class="btn-history" onclick="showHistory(null)">📅 날짜별 전체 내역 보기</button>
  </div>

  <div class="right">
    <div class="topbar">
      <div class="filter-row">
        <button class="f-btn on" id="f-all"  onclick="setFilter('all')">전체</button>
        <button class="f-btn"    id="f-debt" onclick="setFilter('debt')">미수금만</button>
        <button class="f-btn"    id="f-paid" onclick="setFilter('paid')">완납</button>
      </div>
      <div class="date-row">
        <input type="date" id="dFrom" onchange="render()" />
        <span>~</span>
        <input type="date" id="dTo" onchange="render()" />
      </div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>
</div>

<!-- 수금 모달 -->
<div class="overlay" id="payOv" style="display:none">
  <div class="modal">
    <div class="modal-head"><h2 id="payTitle">현금 수금</h2><button class="btn-x" onclick="closePayOv()">✕</button></div>
    <div class="modal-body">
      <p class="pay-desc" id="payDesc"></p>
      <input class="pay-input" id="payAmt" type="number" inputmode="numeric" placeholder="0" />
      <p class="pay-hint">일부만 받으셔도 됩니다</p>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closePayOv()">취소</button>
      <button class="btn-primary green-btn" onclick="confirmPay()">✓ 수금 처리</button>
    </div>
  </div>
</div>

<!-- 날짜별 내역 모달 -->
<div class="overlay" id="histOv" style="display:none">
  <div class="modal">
    <div class="modal-head"><h2 id="histTitle">날짜별 내역</h2><button class="btn-x" onclick="closeHistOv()">✕</button></div>
    <div class="modal-body" id="histBody"></div>
    <div class="modal-foot"><button class="btn-sec" onclick="closeHistOv()">닫기</button></div>
  </div>
</div>

<!-- 손님 상세 모달 -->
<div class="overlay" id="detailOv" style="display:none">
  <div class="modal" style="max-width:520px">
    <div class="modal-head"><h2 id="detailTitle">손님 상세</h2><button class="btn-x" onclick="closeDetail()">✕</button></div>
    <div class="modal-body">
      <div class="detail-info" id="detailInfo"></div>
      <div class="detail-actions" id="detailActions"></div>
      <hr class="detail-divider" />
      <div class="detail-txn-title">거래 내역</div>
      <div id="detailTxns"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closeDetail()">닫기</button>
      <button class="btn-primary green-btn" id="detailPayBtn" onclick="openPayFromDetail()">💵 현금 받기</button>
    </div>
  </div>
</div>

<!-- 문자 확인 모달 -->
<div class="overlay" id="smsOv" style="display:none">
  <div class="modal">
    <div class="modal-head"><h2>문자 보내기</h2><button class="btn-x" onclick="closeSmsOv()">✕</button></div>
    <div class="modal-body">
      <p class="sms-to" id="smsTo"></p>
      <div class="sms-preview" id="smsPreview"></div>
      <p style="font-size:12px;color:var(--text3)">확인 후 '문자 앱 열기'를 눌러 보내주세요</p>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="closeSmsOv()">취소</button>
      <button class="btn-primary orange-btn" onclick="sendSms()">💬 문자 앱 열기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, deleteDoc, collection }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase 설정 ──
const firebaseConfig = {
  apiKey: "AIzaSyCCubr0j7rUjZEJwxkpSNsWMLYH0bix1Dk",
  authDomain: "jeju-85253524.firebaseapp.com",
  projectId: "jeju-85253524",
  storageBucket: "jeju-85253524.firebasestorage.app",
  messagingSenderId: "918141185624",
  appId: "1:918141185624:web:28de75dec8128afeef242d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── 전역 데이터 (실시간 동기화) ──
let DATA = {};

// Firestore 실시간 리스너
const custCol = collection(db, "customers");
onSnapshot(custCol, (snapshot) => {
  DATA = {};
  snapshot.forEach(d => { DATA[d.id] = d.data(); });
  setSyncOk();
  render();
}, (err) => {
  setSyncErr();
  console.error(err);
});

function setSyncOk()  { const el=document.getElementById('syncStatus'); el.textContent='☁️ 저장됨'; el.className='sync-status ok'; }
function setSyncErr() { const el=document.getElementById('syncStatus'); el.textContent='⚠️ 연결 오류'; el.className='sync-status err'; }
function setSyncLoading() { const el=document.getElementById('syncStatus'); el.textContent='저장 중...'; el.className='sync-status loading'; }

// 로딩 화면 제거
setTimeout(() => {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'grid';
}, 1500);

// ── 유틸 ──
function fmt(n) { return Number(n).toLocaleString('ko-KR') + '원'; }
function todayISO() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(s) { if(!s)return''; const[,m,d]=s.split('-'); return m+'월 '+d+'일'; }
function getBal(txns) { return (txns||[]).reduce((s,t)=>s+(t.type==='credit'?t.amount:-t.amount),0); }
function fmtPhone(p) {
  if(!p)return'';
  const d=p.replace(/\D/g,'');
  if(d.length===11)return d.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
  if(d.length===10)return d.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
  return p;
}
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

// 오늘 날짜
(function(){
  const d=new Date();
  document.getElementById('todayLbl').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
})();

// ── Firestore 저장/삭제 ──
async function saveCust(name, data) {
  setSyncLoading();
  await setDoc(doc(db, "customers", name), data);
}
async function deleteCust(name) {
  setSyncLoading();
  await deleteDoc(doc(db, "customers", name));
}

// ── 자동완성 ──
let acIdx=-1;
window.onAcInput = function() {
  const q=document.getElementById('iName').value.trim().toLowerCase();
  const names=Object.keys(DATA);
  const list=q?names.filter(n=>n.toLowerCase().includes(q)):names;
  const el=document.getElementById('acList');
  if(!list.length){el.style.display='none';return;}
  el.innerHTML=list.map(n=>{
    const phone=DATA[n].phone?`<span class="ac-phone">${fmtPhone(DATA[n].phone)}</span>`:'';
    return `<div class="ac-item" data-n="${n}" onmousedown="pickAc('${n}')">${n}${phone}</div>`;
  }).join('');
  el.style.display='block'; acIdx=-1;
};
window.pickAc = function(name) {
  document.getElementById('iName').value=name;
  if(DATA[name]?.phone) document.getElementById('iPhone').value=fmtPhone(DATA[name].phone);
  document.getElementById('acList').style.display='none';
  document.getElementById('iAmt').focus();
};
window.hideAc = function() { setTimeout(()=>{document.getElementById('acList').style.display='none';},160); };
window.onAcKey = function(e) {
  const items=document.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){acIdx=Math.min(acIdx+1,items.length-1);hiAc(items);e.preventDefault();}
  else if(e.key==='ArrowUp'){acIdx=Math.max(acIdx-1,0);hiAc(items);e.preventDefault();}
  else if(e.key==='Enter'&&acIdx>=0&&items[acIdx]){window.pickAc(items[acIdx].dataset.n);e.preventDefault();}
};
function hiAc(items){items.forEach((el,i)=>el.classList.toggle('hi',i===acIdx));if(items[acIdx])items[acIdx].scrollIntoView({block:'nearest'});}

// ── 외상 추가 ──
window.addTxn = async function() {
  const name=document.getElementById('iName').value.trim();
  const phone=document.getElementById('iPhone').value.trim();
  const amtR=document.getElementById('iAmt').value.trim();
  const memo=document.getElementById('iMemo').value.trim();
  if(!name){alert('손님 이름을 입력해 주세요.');return;}
  if(!amtR||isNaN(amtR)||Number(amtR)<=0){alert('금액을 올바르게 입력해 주세요.');return;}
  const cust = DATA[name] ? {...DATA[name]} : {phone:'',transactions:[]};
  if(phone) cust.phone=phone.replace(/\D/g,'');
  cust.transactions=[...(cust.transactions||[]),{type:'credit',amount:parseInt(amtR),memo:memo||'외상',date:todayISO()}];
  await saveCust(name, cust);
  document.getElementById('iAmt').value='';
  document.getElementById('iMemo').value='';
  toast(name+' 님 외상 추가 완료!');
};

// ── 수금 모달 ──
let payName=null;
window.openPay = function(name) {
  payName=name;
  const bal=getBal(DATA[name].transactions);
  document.getElementById('payTitle').textContent=name+' 님 수금';
  document.getElementById('payDesc').textContent='현재 미수금: '+fmt(bal);
  document.getElementById('payAmt').value=bal;
  document.getElementById('payOv').style.display='flex';
  setTimeout(()=>document.getElementById('payAmt').focus(),120);
};
window.closePayOv = function() {document.getElementById('payOv').style.display='none';payName=null;};
window.confirmPay = async function() {
  const amtR=document.getElementById('payAmt').value.trim();
  if(!amtR||isNaN(amtR)||Number(amtR)<=0){alert('금액을 입력해 주세요.');return;}
  const cust={...DATA[payName]};
  cust.transactions=[...(cust.transactions||[]),{type:'debit',amount:parseInt(amtR),memo:'현금 수금',date:todayISO()}];
  await saveCust(payName, cust);
  toast(payName+' 님 '+fmt(parseInt(amtR))+' 수금 완료!');
  window.closePayOv();
  if(document.getElementById('detailOv').style.display!=='none') window.showDetail(payName);
};

// ── 손님 상세 모달 ──
let detailName=null;
window.showDetail = function(name) {
  detailName=name;
  const cust=DATA[name];
  const bal=getBal(cust.transactions);
  const hasDebt=bal>0;
  const phone=cust.phone?fmtPhone(cust.phone):null;
  document.getElementById('detailTitle').textContent=name+' 님';
  document.getElementById('detailInfo').innerHTML=`
    <div class="detail-row"><span class="detail-label">미수금</span>
      <span class="detail-val" style="color:${hasDebt?'var(--red)':'var(--green)'};font-size:20px;font-weight:700">${hasDebt?fmt(bal):'완납 ✅'}</span></div>
    <div class="detail-row"><span class="detail-label">전화번호</span>
      <span class="detail-val">${phone||'등록 안됨'}</span></div>`;
  const callBtn=phone?`<a href="tel:${cust.phone}" class="btn-action call">📞 전화</a>`:`<span class="btn-action disabled">📞 전화</span>`;
  const smsBtn=phone?`<button class="btn-action sms" onclick="openSms('${name}')">💬 문자</button>`:`<span class="btn-action disabled">💬 문자</span>`;
  document.getElementById('detailActions').innerHTML=callBtn+smsBtn;
  document.getElementById('detailPayBtn').style.display=hasDebt?'':'none';
  const txns=[...(cust.transactions||[])].reverse();
  document.getElementById('detailTxns').innerHTML=txns.map(t=>`
    <div class="txn-row">
      <span class="txn-date">${fmtDate(t.date)}</span>
      <span class="txn-memo">${t.memo}</span>
      <span class="txn-amt ${t.type==='credit'?'plus':'minus'}">${t.type==='credit'?'+':'-'}${fmt(t.amount)}</span>
    </div>`).join('');
  document.getElementById('detailOv').style.display='flex';
};
window.closeDetail = function(){document.getElementById('detailOv').style.display='none';detailName=null;};
window.openPayFromDetail = function(){window.closeDetail();window.openPay(detailName);};

// ── SMS ──
let smsPhone=null, smsText=null;
window.openSms = function(name) {
  const cust=DATA[name];
  smsPhone=cust.phone;
  const bal=getBal(cust.transactions);
  smsText=`[현금장부] ${name} 님, 미수금 ${fmt(bal)}이 남아있습니다. 확인 부탁드립니다.`;
  document.getElementById('smsTo').textContent='받는 사람: '+fmtPhone(smsPhone);
  document.getElementById('smsPreview').textContent=smsText;
  document.getElementById('smsOv').style.display='flex';
};
window.closeSmsOv = function(){document.getElementById('smsOv').style.display='none';};
window.sendSms = function(){
  window.location.href=`sms:${smsPhone}?body=${encodeURIComponent(smsText)}`;
  window.closeSmsOv();
};

// ── 날짜별 내역 ──
window.showHistory = function(nameFilter) {
  const all=[];
  Object.entries(DATA).forEach(([name,cust])=>(cust.transactions||[]).forEach(t=>all.push({...t,name})));
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const txns=nameFilter?all.filter(t=>t.name===nameFilter):all;
  const groups={};
  txns.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);});
  const dates=Object.keys(groups).sort().reverse();
  document.getElementById('histTitle').textContent=nameFilter?nameFilter+' 님 내역':'날짜별 전체 내역';
  document.getElementById('histBody').innerHTML=dates.length?dates.map(date=>{
    const dayAmt=groups[date].reduce((s,t)=>s+(t.type==='credit'?t.amount:-t.amount),0);
    const rows=groups[date].map(t=>`<div class="day-txn">
      ${!nameFilter?`<span class="day-name">${t.name}</span>`:''}
      <span class="day-memo">${t.memo}</span>
      <span class="txn-amt ${t.type==='credit'?'plus':'minus'}">${t.type==='credit'?'+':'-'}${fmt(t.amount)}</span>
    </div>`).join('');
    return `<div class="day-group"><div class="day-label"><span>${fmtDate(date)}</span>
      <span class="day-total ${dayAmt>=0?'plus':'minus'}">${dayAmt>0?'+':''}${fmt(dayAmt)}</span></div>${rows}</div>`;
  }).join(''):'<div style="text-align:center;padding:40px;color:#9aa0a6">내역이 없습니다.</div>';
  document.getElementById('histOv').style.display='flex';
};
window.closeHistOv = function(){document.getElementById('histOv').style.display='none';};

// ── 삭제 ──
window.delCust = async function(name) {
  if(!confirm(name+' 님의 모든 기록을 삭제할까요?'))return;
  await deleteCust(name);
  toast(name+' 님 삭제 완료');
};

// ── 필터 ──
let curFilter='all';
window.setFilter = function(f) {
  curFilter=f;
  ['all','debt','paid'].forEach(k=>document.getElementById('f-'+k).classList.toggle('on',k===f));
  render();
};

// ── 메인 렌더 ──
function render() {
  const names=Object.keys(DATA);
  let totalDebt=0,debtCnt=0;
  names.forEach(n=>{const b=getBal(DATA[n].transactions);if(b>0){totalDebt+=b;debtCnt++;}});
  document.getElementById('sumGrid').innerHTML=`
    <div class="sum-card red"><div class="sum-label">💸 총 미수금</div><div class="sum-value">${fmt(totalDebt)}</div></div>
    <div class="sum-card green"><div class="sum-label">✅ 미수 손님</div><div class="sum-value">${debtCnt}명</div></div>
    <div class="sum-card gray"><div class="sum-label">👥 전체 손님</div><div class="sum-value">${names.length}명</div></div>
    <div class="sum-card gray"><div class="sum-label">📋 전체 건수</div><div class="sum-value">${names.reduce((s,n)=>s+(DATA[n].transactions||[]).length,0)}건</div></div>
  `;
  const dFrom=document.getElementById('dFrom').value;
  const dTo=document.getElementById('dTo').value;
  let list=names.filter(n=>{
    const b=getBal(DATA[n].transactions);
    if(curFilter==='debt')return b>0;
    if(curFilter==='paid')return b<=0;
    return true;
  }).sort((a,b)=>getBal(DATA[b].transactions)-getBal(DATA[a].transactions));
  const grid=document.getElementById('cardGrid');
  if(!list.length){grid.innerHTML='<div class="empty">손님이 없습니다.<br>왼쪽에서 외상을 추가해 보세요.</div>';return;}
  grid.innerHTML=list.map(name=>{
    const cust=DATA[name];
    const bal=getBal(cust.transactions);
    const hasDebt=bal>0;
    const phone=cust.phone?fmtPhone(cust.phone):null;
    let txns=cust.transactions||[];
    if(dFrom)txns=txns.filter(t=>t.date>=dFrom);
    if(dTo)txns=txns.filter(t=>t.date<=dTo);
    const rows=[...txns].reverse().slice(0,5).map(t=>`
      <div class="txn-row">
        <span class="txn-date">${fmtDate(t.date)}</span>
        <span class="txn-memo">${t.memo}</span>
        <span class="txn-amt ${t.type==='credit'?'plus':'minus'}">${t.type==='credit'?'+':'-'}${fmt(t.amount)}</span>
      </div>`).join('')||'<div style="text-align:center;padding:10px;color:#9aa0a6;font-size:13px">해당 기간 내역 없음</div>';
    const callBtn=phone?`<a href="tel:${cust.phone}" class="btn-call" title="전화">📞</a>`:`<span class="btn-disabled">📞</span>`;
    const smsBtn=phone?`<button class="btn-sms" onclick="openSms('${name}')" title="문자">💬</button>`:`<span class="btn-disabled">💬</span>`;
    return `<div class="cust-card ${hasDebt?'debt':'paid'}">
      <div class="card-head">
        <span class="card-name" onclick="showDetail('${name}')">${name}</span>
        <span class="badge ${hasDebt?'red':'green'}">${hasDebt?fmt(bal):'완납'}</span>
      </div>
      ${phone?`<div class="card-phone">📱 ${phone}</div>`:''}
      <div class="txn-list">${rows}</div>
      <div class="card-btns">
        <button class="btn-pay" ${!hasDebt?'disabled':''} onclick="openPay('${name}')">${hasDebt?'💵 현금 받기':'완납됨'}</button>
        ${callBtn}${smsBtn}
        <button class="btn-del" onclick="delCust('${name}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
